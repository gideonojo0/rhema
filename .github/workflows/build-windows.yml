name: Build Rhema Windows EXE (Final)

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build frontend with Vite
        run: bun run vite build

      - name: Verify dist folder exists
        run: |
          if (Test-Path dist) {
            echo "dist folder exists"
          } else {
            echo "dist folder not found - checking for src/dist"
            if (Test-Path src/dist) {
              echo "src/dist exists - copying to root"
              Copy-Item -Path src/dist -Destination dist -Recurse
            } else {
              echo "No dist folder found - creating one"
              New-Item -Path dist -ItemType Directory
            }
          }

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Tauri app with Cargo (skip beforeBuildCommand)
        run: |
          cargo tauri build -- --no-before-build --features windows

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rhema-windows
          path: |
            src-tauri/target/release/*.exe
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
