name: Build Rhema Windows EXE (Final)

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Install Node.js and Bun
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Run the Windows setup script to install LLVM, CMake, and set LIBCLANG_PATH
      - name: Run Windows setup script
        shell: pwsh
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          ./scripts/setup-windows.ps1

      # Install project dependencies
      - name: Install dependencies
        run: bun install

      # Build the frontend (creates dist folder)
      - name: Build frontend with Vite
        run: bun run vite build

      # Patch tauri.conf.json to remove beforeBuildCommand
      - name: Remove beforeBuildCommand from tauri.conf.json
        shell: pwsh
        run: |
          $configPath = "src-tauri/tauri.conf.json"
          $json = Get-Content $configPath -Raw | ConvertFrom-Json
          if ($json.build.beforeBuildCommand) {
            $json.build.PSObject.Properties.Remove('beforeBuildCommand')
            $json | ConvertTo-Json -Depth 10 | Set-Content $configPath
            Write-Host "Removed beforeBuildCommand from tauri.conf.json"
          } else {
            Write-Host "beforeBuildCommand not found, skipping"
          }

      # Install Rust toolchain
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # Build the Tauri app using Cargo (bypasses tauri CLI's beforeBuildCommand)
      - name: Build Tauri app
        run: cargo tauri build --features windows
        env:
          LIBCLANG_PATH: C:\Program Files\LLVM\bin

      # Upload the built artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rhema-windows
          path: |
            src-tauri/target/release/*.exe
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
