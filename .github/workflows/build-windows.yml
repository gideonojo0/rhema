name: Build Rhema Windows EXE

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Fix beforeBuildCommand to skip TypeScript
        shell: pwsh
        run: |
          (Get-Content src-tauri/tauri.conf.json) -replace '"beforeBuildCommand": "bun build"', '"beforeBuildCommand": "bun run vite build"' | Set-Content src-tauri/tauri.conf.json

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: manual-build-${{ github.run_id }}
          releaseName: 'Manual Build ${{ github.run_id }}'
          releaseBody: 'Windows build from manual trigger.'
          releaseDraft: true
          includeDebug: false
