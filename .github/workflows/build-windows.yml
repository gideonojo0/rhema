name: Build Rhema Windows EXE

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Fix beforeBuildCommand to skip TypeScript
        shell: pwsh
        run: |
          (Get-Content src-tauri/tauri.conf.json) -replace '"beforeBuildCommand": "bun build"', '"beforeBuildCommand": "bun run vite build"' | Set-Content src-tauri/tauri.conf.json

      - name: Build Tauri app
        run: bun run tauri build

      # ---------- UPLOAD ARTIFACTS (Always available) ----------
      - name: Upload MSI installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: rhema-msi
          path: src-tauri/target/release/bundle/msi/*.msi

      - name: Upload NSIS installer (EXE) as artifact
        uses: actions/upload-artifact@v4
        with:
          name: rhema-exe
          path: src-tauri/target/release/bundle/nsis/*.exe

      # ---------- CREATE RELEASE (Only if GITHUB_TOKEN has permissions) ----------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: manual-build-${{ github.run_id }}
          name: Manual Build ${{ github.run_id }}
          body: Windows build from manual trigger.
          draft: true
          prerelease: false
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
