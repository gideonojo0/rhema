name: Build Rhema Windows EXE

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build frontend (Vite) – skip type checking
        run: bun run vite build
        working-directory: src
        env:
          VITE_SKIP_TYPE_CHECK: true

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: manual-build-${{ github.run_id }}
          releaseName: 'Manual Build ${{ github.run_id }}'
          releaseBody: 'Windows build from manual trigger.'
          releaseDraft: true
          includeDebug: false
          args: -- --no-before-build --features windows
